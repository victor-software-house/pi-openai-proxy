name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (Biome)
        run: bun run lint:biome

      - name: Lint (oxlint)
        run: bun run lint:oxlint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  package:
    name: Package validation
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify dist output
        run: |
          test -f dist/index.mjs || { echo "dist/index.mjs not found"; exit 1; }
          echo "Package output verified"

      - name: Dry-run pack
        run: bun pm pack --dry-run
